services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: siexud_backend
    restart: unless-stopped
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    networks:
      - siexud_net
    depends_on: []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: siexud_frontend
    restart: unless-stopped
    networks:
      - siexud_net
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: siexud_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - siexud_net
    depends_on:
      - frontend
      - backend

networks:
  siexud_net:
    driver: bridge